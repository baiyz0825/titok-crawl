# ============================================
# 单容器化部署配置
# 所有功能集成在一个容器中，# ============================================
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: douyin-scraper:latest
    container_name: douyin-scraper
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP (nginx)
    volumes:
      - ./data:/app/data
    environment:
      - HEADLESS=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/sessions/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
