services:
  # ── Nginx 统一入口（唯一暴露端口）──
  nginx:
    image: nginx:alpine
    container_name: douyin-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - ./data/media:/data/media:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ── 后端 API ──
  backend:
    build: .
    container_name: douyin-backend
    volumes:
      - ./data:/app/data
      - frontend-dist:/shared/html    # 启动时把 dist 复制到这里
    environment:
      - HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/sessions/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  # ── Datasette 数据库浏览器 ──
  datasette:
    image: datasetteproject/datasette:latest
    container_name: douyin-datasette
    volumes:
      - ./data:/data:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for database file..."
        while [ ! -f /data/db/douyin.db ]; do sleep 2; done
        echo "Database found, starting datasette"
        exec datasette /data/db/douyin.db -h 0.0.0.0 -p 8002 \
          --setting sql_time_limit_ms 5000 \
          --setting base_url /datasette/
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend-dist:
